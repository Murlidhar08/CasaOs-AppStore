      en_us: |
        Default login will require configuration.

        Access the app at:
        http://<your-server-ip>:6854

        Make sure to update:
        - DATABASE_URL (pre-configured for internal DB)
        - BETTER_AUTH_SECRET
        - OAuth credentials (optional)
