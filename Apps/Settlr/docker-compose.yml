name: settlr
services:
  # Settlr Application
  settlr:
    container_name: settlr
    image: chavda2772/settlr:latest
    ports:
      - '6854:3000'
    restart: unless-stopped
    labels:
      icon: https://raw.githubusercontent.com/Murlidhar08/CasaOs-AppStore/refs/heads/main/Apps/Settlr/icon.png
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=Settlr
      - BETTER_AUTH_SECRET=CBRi63R1uFOM7kBZVTwZ1H1rNkpfH4S5
      - BETTER_AUTH_URL=http://localhost:6854
      - DATABASE_URL=postgresql://user:password@db:5432/settlr

      # Optional integrations
      - GOOGLE_CLIENT_ID=<GOOGLE>
      - GOOGLE_CLIENT_SECRET=<GOOGLE>
      - DISCORD_CLIENT_ID="<DISCORD>"
      - DISCORD_CLIENT_SECRET=<DISCORD>

      # Email (optional)
      - FROM_EMAIL=<settlr@example.com>
      - SMTP_HOST=mail.example.com
      - SMTP_PASS=<password>
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=settlr@example.com
    volumes:
      - /DATA/AppData/$AppID/web:/app/data
    depends_on:
      - db
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/health']

  # Settlr DB
  db:
    cpu_shares: 90
    container_name: settlr-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=settlr
      - POSTGRES_USER=settlr
      - POSTGRES_PASSWORD=settlrpassword
    labels:
      icon: https://raw.githubusercontent.com/Murlidhar08/CasaOs-AppStore/refs/heads/main/Apps/Settlr/icon.png
    volumes:
      - /DATA/AppData/$AppID/db:/var/lib/postgresql/data
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  author: Chavda Mahesh
  category: Finance
  title:
    en_us: Settlr
  description:
    en_us: |
      Settlr is a self-hosted financial tracking application.

      Features:
      - Track income & expenses
      - Manage parties and transactions
      - Business-level accounting
      - Secure authentication
      - Clean and responsive UI
  developer: Chavda Mahesh
  icon: https://raw.githubusercontent.com/Murlidhar08/CasaOs-AppStore/refs/heads/main/Apps/Settlr/icon.png
  main: settlr
  port_map: '6854'
  project_url: https://github.com/Murlidhar08/settlr
  screenshot_link:
    - https://raw.githubusercontent.com/mr-manuel/CasaOS-HomeAutomation-AppStore/latest/Apps/settlr/screenshot-1.png
    - https://raw.githubusercontent.com/mr-manuel/CasaOS-HomeAutomation-AppStore/latest/Apps/settlr/screenshot-2.png
  store_app_id: settlr
  tagline:
    en_us: Simple business accounting and transaction management system.
  thumbnail: https://raw.githubusercontent.com/mr-manuel/CasaOS-HomeAutomation-AppStore/latest/Apps/settlr/icon.png
  tips:
    before_install:
      en_us: |
        Default login will require configuration.

        Access the app at:
        http://<your-server-ip>:6854

        Make sure to update:
        - DATABASE_URL
        - BETTER_AUTH_SECRET
        - OAuth credentials (optional)
